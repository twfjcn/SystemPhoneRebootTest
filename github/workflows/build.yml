name: Auto Build APK
# 触发条件：推送代码、PR时自动打包
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库全部代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置Java17（Android Gradle 8.x必须）
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # 3. 赋予gradlew执行权限
      - name: Grant execute permission
        run: chmod +x gradlew

      # 4. 编译Release未签名APK
      - name: Build Release APK
        run: ./gradlew assembleRelease

      # 5. 将生成的APK作为制品上传，可下载
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoBoot_APK_Release
          path: app/build/outputs/apk/release/*.apk